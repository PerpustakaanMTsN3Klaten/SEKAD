<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SEKAD Perpustakaan MTsN 3 Klaten</title>
  <link rel="icon" href="https://jateng.kemenag.go.id/wp-content/uploads/2022/01/LogoKemenag_Normal_White.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: auto
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbxTBkCYBZUKqBteOqjHjV2-mv7enZ6s00RxfotjU2joZ-VnfRoTTMnwBVwjFHHtv17NIA/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
  <script>
  window.addEventListener('touchstart', function() {
    var iframe = document.querySelector('iframe');
    if (iframe) {
      iframe.focus();
    }
  }, false);

  // Tambahan: Kirim pesan "Klik" ke dalam iframe
  window.addEventListener('click', function() {
    var iframe = document.querySelector('iframe');
    if (iframe) {
      iframe.focus();
    }
  });
</script>
</body>
</html>
